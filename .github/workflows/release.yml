name: Release

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].[0-9][0-9]'        # YYYY.MM
      - '[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9]*'  # YYYY.MM.N

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # full history for release notes generation

    - name: Validate CalVer tag format
      run: |
        TAG="${GITHUB_REF_NAME}"
        if ! echo "$TAG" | grep -qE '^[0-9]{4}\.(0[1-9]|1[0-2])(\.[0-9]+)?$'; then
          echo "::error::Tag '$TAG' does not match CalVer format YYYY.MM or YYYY.MM.N"
          exit 1
        fi

    - name: Build MAWF Using LeGrands Recipe
      uses: xu-cheng/texlive-action@v2
      with:
        scheme: full
        run: |
          pdflatex  -file-line-error -halt-on-error -interaction=nonstopmode -shell-escape -recorder  "main.tex"
          makeindex main.idx -s StyleInd.ist
          biber main
          pdflatex  -file-line-error -halt-on-error -interaction=nonstopmode -shell-escape -recorder  "main.tex"
          pdflatex  -file-line-error -halt-on-error -interaction=nonstopmode -shell-escape -recorder  "main.tex"
          # second pass to stabilize cross-references
          pdflatex  -file-line-error -halt-on-error -interaction=nonstopmode -shell-escape -recorder  "main.tex"
          makeindex main.idx -s StyleInd.ist
          biber main
          pdflatex  -file-line-error -halt-on-error -interaction=nonstopmode -shell-escape -recorder  "main.tex"
          pdflatex  -file-line-error -halt-on-error -interaction=nonstopmode -shell-escape -recorder  "main.tex"

    - name: Rename PDF with version
      run: mv main.pdf "Modern_Algebra_with_Friends_${{ github.ref_name }}.pdf"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: "Modern Algebra with Friends ${{ github.ref_name }}"
        generate_release_notes: true
        files: "Modern_Algebra_with_Friends_${{ github.ref_name }}.pdf"
      env:
        GITHUB_TOKEN: ${{ secrets.BUILD_PDF_SECRET }}
